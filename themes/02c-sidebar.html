<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>02c · Swiss · sidebar tags</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--stone-50:#fafaf9;--stone-100:#f5f5f4;--stone-200:#e7e5e4;--stone-300:#d6d3d1;--stone-400:#a8a29e;--stone-500:#78716c;--stone-700:#44403c;--stone-900:#1c1917;--swiss-red:#C8102E;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{background:var(--stone-50);color:var(--stone-900);font-family:var(--sans);font-size:16px;line-height:1.6;font-weight:400;-webkit-font-smoothing:antialiased;min-height:100vh}

  .theme-nav{position:fixed;top:24px;right:24px;z-index:100;display:flex;font-family:var(--mono);font-size:11px;background:var(--stone-50);border:1px solid var(--stone-200)}
  .theme-nav a{padding:6px 12px;color:var(--stone-500);text-decoration:none;text-transform:uppercase;letter-spacing:.08em;border-right:1px solid var(--stone-200)}
  .theme-nav a:last-child{border-right:none}
  .theme-nav a.active{background:var(--stone-900);color:var(--stone-50)}
  .theme-nav a:hover:not(.active){color:var(--stone-900)}

  .layout{display:grid;grid-template-columns:240px 1fr;gap:48px;max-width:1440px;margin:0 auto;padding:64px 48px 96px;min-height:100vh}
  @media(max-width:880px){.layout{grid-template-columns:1fr;gap:24px}}

  /* Sidebar */
  .sidebar{position:sticky;top:64px;align-self:start}
  .sidebar .brand{font-size:32px;font-weight:300;line-height:.95;letter-spacing:-.03em;margin:0 0 4px}
  .sidebar .brand .accent{color:var(--swiss-red)}
  .sidebar .sub{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500);margin-bottom:32px}
  .sidebar .group-label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500);padding-bottom:8px;border-bottom:1px solid var(--stone-900);margin:24px 0 8px}
  .sidebar .tag-list{list-style:none;padding:0;margin:0}
  .sidebar .tag-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--stone-200);cursor:pointer;font-size:15px;transition:color .12s,border-color .12s;gap:8px}
  .sidebar .tag-item:first-child{border-top:none}
  .sidebar .tag-item .label{display:flex;align-items:center;gap:8px;min-width:0}
  .sidebar .tag-item .pip{display:inline-block;width:10px;height:10px;background:var(--c, var(--stone-400));border-radius:1px;flex:none}
  .sidebar .tag-item:hover{color:var(--c, var(--swiss-red))}
  .sidebar .tag-item.active{color:var(--c, var(--swiss-red));border-top-color:var(--c, var(--swiss-red));font-weight:500}
  .sidebar .tag-item.active + .tag-item{border-top-color:var(--c, var(--swiss-red))}
  .sidebar .tag-item .count{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--stone-400)}
  .sidebar .tag-item.active .count{color:var(--c, var(--swiss-red))}
  .note{border-top:2px solid var(--note-c, var(--stone-300))}
  .note:hover{border-top-width:3px}

  /* Main column */
  .main-col{min-width:0}
  .main-col .write{margin:0 0 32px;border-top:1px solid var(--stone-900);border-bottom:1px solid var(--stone-200);padding:20px 0}
  .main-col .write textarea{width:100%;max-width:60ch;border:none;background:transparent;outline:none;resize:none;font-family:var(--sans);font-size:20px;font-weight:300;line-height:1.4;color:var(--stone-900);padding:0;min-height:1.4em}
  .main-col .write textarea::placeholder{color:var(--stone-300)}
  .main-col .write .hint{margin-top:10px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-400)}
  .main-col .write .hint kbd{font-family:var(--mono);padding:1px 5px;border:1px solid var(--stone-300);border-radius:2px;font-size:10px;color:var(--stone-700)}

  .search{margin:0 0 32px;border-bottom:1px solid var(--stone-300);padding-bottom:8px;display:flex;align-items:baseline;gap:14px}
  .search .label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500)}
  .search input{flex:1;border:none;background:transparent;outline:none;font-family:var(--sans);font-size:18px;font-weight:300;color:var(--stone-900);padding:0}
  .search input::placeholder{color:var(--stone-300)}
  .search .count{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500);white-space:nowrap}
  .search .count .n{color:var(--stone-900)}

  .scope{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500);margin:0 0 16px}
  .scope .v{color:var(--swiss-red)}

  .notes{columns:1;column-gap:40px}
  @media(min-width:1080px){.notes{columns:2;column-gap:40px}}
  @media(min-width:1320px){.notes{columns:3;column-gap:40px}}

  .note{break-inside:avoid;padding:22px 0;border-top:1px solid var(--stone-200);cursor:pointer;transition:border-color .15s}
  .note:first-child{border-top:1px solid var(--stone-900)}
  .note:hover{border-top-color:var(--swiss-red)}
  .note .text{font-size:17px;line-height:1.5;color:var(--stone-900);margin:0;max-width:60ch}
  .note .caption{margin-top:12px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500)}
</style>
</head>
<body>
<nav class="theme-nav">

  <a href="02e-pills.html">02e</a>
  <a href="02e-bg.html">02e-BG ★</a>
  <a href="side/02f-nerv.html">side: 02f</a>
  <a href="side/03-nerv.html">side: 03</a>
  <a href="side/03b-nerv-light.html">side: 03b</a>
  <a href="04-brutalist.html">04 BRUTAL</a>
</nav>

<div class="layout">

  <aside class="sidebar">
    <h1 class="brand">Notes<span class="accent">.</span></h1>
    <div class="sub">1,776 · 2026</div>

    <div class="group-label">Tags</div>
    <ul class="tag-list" id="tag-list"></ul>
  </aside>

  <section class="main-col">
    <section class="write">
      <textarea placeholder="write a note…" rows="1"></textarea>
      <div class="hint"><kbd>⌘</kbd> <kbd>↵</kbd> save</div>
    </section>

    <div class="search">
      <span class="label">Find</span>
      <input type="text" id="search" placeholder="search within scope">
      <span class="count"><span class="n" id="count">8</span> / 8</span>
    </div>

    <p class="scope" id="scope">Showing <span class="v">all</span></p>

    <div class="notes" id="notes"></div>
  </section>
</div>

<script>
  const NOTES = [
    { uuid:'a1', text:'buy bok choy', updated:'2026-05-22T18:04:00Z', tags:['todo','shop'] },
    { uuid:'b2', text:'idea: sticky note board with masonry layout via pretext', updated:'2026-05-22T15:31:00Z', tags:['idea','board'] },
    { uuid:'c3', text:'the difference between vision and hallucination is whether other people can see it too', updated:'2026-05-21T22:11:00Z', tags:['thought'] },
    { uuid:'d4', text:'todo: ssh into the new box, set up tailscale, install zellij', updated:'2026-05-21T09:47:00Z', tags:['todo','infra'] },
    { uuid:'e5', text:"today's lesson — pretext is a library not a framework. you render with whatever.", updated:'2026-05-20T16:22:00Z', tags:['lesson'] },
    { uuid:'f6', text:'jamie birthday march 14', updated:'2026-05-19T11:00:00Z', tags:['reminder','people'] },
    { uuid:'g7', text:'the way to import 40 thousand art hoes to SF to teach engineers love (and thus save humankind) would be to open an elite fashion school. considering the materials science infrastructure this is actually the obvious path forward for fashion.', updated:'2026-05-18T03:14:00Z', tags:['idea','hot-take'] },
    { uuid:'h8', text:'every infra choice is a bet on who you will be in two years', updated:'2026-05-17T08:00:00Z', tags:['thought','infra'] },
  ];
  const fmt = iso => { const d=new Date(iso),p=n=>String(n).padStart(2,'0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${String(d.getFullYear()).slice(2)}`; };

  const TAG_COLORS = {todo:'#C8102E',shop:'#E8704A',idea:'#003B8E',board:'#0F766E',thought:'#6E3CBC',infra:'#44403c',lesson:'#C99700',reminder:'#2D6A4F',people:'#B8336A','hot-take':'#DC2626'};
  const tagColor = t => TAG_COLORS[t] || '#A8A29E';
  const counts = NOTES.reduce((acc,n) => { for (const t of n.tags) acc[t] = (acc[t]||0)+1; return acc; }, {});
  const sortedTags = Object.entries(counts).sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0]));

  let activeTag = null;

  function renderTags() {
    const list = document.getElementById('tag-list');
    const all = `<li class="tag-item ${!activeTag?'active':''}" data-tag="" style="--c:#1c1917"><span class="label"><span class="pip" style="background:linear-gradient(135deg,#C8102E 0%,#003B8E 50%,#0F766E 100%)"></span>All</span><span class="count">${NOTES.length}</span></li>`;
    const rest = sortedTags.map(([tag,n]) => `<li class="tag-item ${activeTag===tag?'active':''}" data-tag="${tag}" style="--c:${tagColor(tag)}"><span class="label"><span class="pip"></span>${tag}</span><span class="count">${n}</span></li>`).join('');
    list.innerHTML = all + rest;
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    let list = NOTES;
    if (activeTag) list = list.filter(n => n.tags.includes(activeTag));
    if (q) list = list.filter(n => n.text.toLowerCase().includes(q));
    const root = document.getElementById('notes'); root.innerHTML = '';
    list.forEach(n => {
      const el = document.createElement('article'); el.className = 'note';
      el.style.setProperty('--note-c', tagColor(n.tags[0]));
      el.innerHTML = `<p class="text"></p><div class="caption">${fmt(n.updated)}</div>`;
      el.querySelector('.text').textContent = n.text;
      root.appendChild(el);
    });
    document.getElementById('count').textContent = list.length;
    document.getElementById('scope').innerHTML = `Showing <span class="v">${activeTag ? '#' + activeTag : 'all'}</span>${q ? ` containing &ldquo;${q}&rdquo;` : ''}`;
    renderTags();
  }
  render();

  document.getElementById('tag-list').addEventListener('click', e => {
    const li = e.target.closest('.tag-item'); if (!li) return;
    activeTag = li.dataset.tag || null; render();
  });
  let t; document.getElementById('search').addEventListener('input', () => { clearTimeout(t); t = setTimeout(render, 150); });
</script>
</body>
