<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>02a · Swiss · inline hashtags</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--stone-50:#fafaf9;--stone-100:#f5f5f4;--stone-200:#e7e5e4;--stone-300:#d6d3d1;--stone-400:#a8a29e;--stone-500:#78716c;--stone-700:#44403c;--stone-900:#1c1917;--swiss-red:#C8102E;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{background:var(--stone-50);color:var(--stone-900);font-family:var(--sans);font-size:16px;line-height:1.6;font-weight:400;-webkit-font-smoothing:antialiased;min-height:100vh}

  .theme-nav{position:fixed;top:24px;right:24px;z-index:100;display:flex;font-family:var(--mono);font-size:11px;background:var(--stone-50);border:1px solid var(--stone-200)}
  .theme-nav a{padding:6px 12px;color:var(--stone-500);text-decoration:none;text-transform:uppercase;letter-spacing:.08em;border-right:1px solid var(--stone-200)}
  .theme-nav a:last-child{border-right:none}
  .theme-nav a.active{background:var(--stone-900);color:var(--stone-50)}
  .theme-nav a:hover:not(.active){color:var(--stone-900)}

  .board{max-width:1400px;margin:0 auto;padding:64px 48px 96px}
  .masthead{display:grid;grid-template-columns:1fr auto;align-items:end;gap:24px;padding-bottom:48px}
  .display{font-size:clamp(48px,7vw,80px);font-weight:300;line-height:.95;letter-spacing:-.04em;margin:0}
  .display .accent{color:var(--swiss-red)}
  .meta-line{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500)}
  .meta-line .v{color:var(--stone-900)}

  .write{margin:0 0 48px;border-top:1px solid var(--stone-900);border-bottom:1px solid var(--stone-200);padding:24px 0}
  .write textarea{width:100%;max-width:60ch;border:none;background:transparent;outline:none;resize:none;font-family:var(--sans);font-size:22px;font-weight:300;line-height:1.4;color:var(--stone-900);padding:0;min-height:1.4em}
  .write textarea::placeholder{color:var(--stone-300);font-weight:300}
  .write .hint{margin-top:12px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-400)}
  .write .hint kbd{font-family:var(--mono);padding:1px 5px;border:1px solid var(--stone-300);border-radius:2px;font-size:10px;color:var(--stone-700)}
  .write .hint .tip{color:var(--swiss-red)}

  .search{margin:0 0 48px;border-bottom:1px solid var(--stone-300);padding-bottom:10px;display:flex;align-items:baseline;gap:16px}
  .search .label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500)}
  .search input{flex:1;border:none;background:transparent;outline:none;font-family:var(--sans);font-size:20px;font-weight:300;color:var(--stone-900);padding:0}
  .search input::placeholder{color:var(--stone-300)}
  .search .count{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500);white-space:nowrap}
  .search .count .n{color:var(--stone-900)}
  .search .filter{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--swiss-red);white-space:nowrap}
  .search .filter button{background:none;border:none;color:inherit;font:inherit;cursor:pointer;text-transform:inherit;letter-spacing:inherit;padding:0}

  .notes{columns:1;column-gap:48px}
  @media(min-width:720px){.notes{columns:2;column-gap:40px}}
  @media(min-width:1080px){.notes{columns:3;column-gap:48px}}

  .note{break-inside:avoid;padding:24px 0;border-top:1px solid var(--stone-200);cursor:pointer;transition:border-color .15s}
  .note:first-child{border-top:1px solid var(--stone-900)}
  .note:hover{border-top-color:var(--swiss-red)}
  .note .text{font-size:17px;font-weight:400;line-height:1.5;color:var(--stone-900);margin:0;max-width:60ch}
  .note .tag{color:var(--c, var(--swiss-red));font-weight:500;cursor:pointer;transition:opacity .12s}
  .note .tag:hover{text-decoration:underline}
  .note{border-top:2px solid var(--note-c, var(--stone-300))}
  .note:hover{border-top-width:3px}
  .note .caption{margin-top:14px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500)}

  footer{margin-top:96px;padding-top:24px;border-top:1px solid var(--stone-900);display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--stone-500)}
</style>
</head>
<body>
<nav class="theme-nav">

  <a href="side/02f-nerv.html">side: 02f</a>
  <a href="side/03-nerv.html">side: 03</a>
  <a href="side/03b-nerv-light.html">side: 03b</a>
  <a href="04-brutalist.html">04 BRUTAL</a>
</nav>

<main class="board">
  <header class="masthead">
    <h1 class="display">Notes<span class="accent">.</span></h1>
    <span class="meta-line"><span class="v">1,776</span> entries · 2026</span>
  </header>

  <section class="write">
    <textarea placeholder="write a note… type #tag inline to categorize" rows="1"></textarea>
    <div class="hint"><kbd>⌘</kbd> <kbd>↵</kbd> save · <span class="tip">hashtags become tags</span></div>
  </section>

  <div class="search">
    <span class="label">Find</span>
    <input type="text" id="search" placeholder="search · click any #tag to filter">
    <span class="filter" id="filter" style="display:none"><button id="clear-filter">clear filter ✕</button></span>
    <span class="count"><span class="n" id="count">8</span> / 8</span>
  </div>

  <div class="notes" id="notes"></div>

  <footer><span>02a · inline hashtags</span><span>tags inline · click to filter</span></footer>
</main>

<script>
  const NOTES = [
    { uuid:'a1', text:'buy bok choy', updated:'2026-05-22T18:04:00Z', tags:['todo','shop'] },
    { uuid:'b2', text:'idea: sticky note board with masonry layout via pretext', updated:'2026-05-22T15:31:00Z', tags:['idea','board'] },
    { uuid:'c3', text:'the difference between vision and hallucination is whether other people can see it too', updated:'2026-05-21T22:11:00Z', tags:['thought'] },
    { uuid:'d4', text:'todo: ssh into the new box, set up tailscale, install zellij', updated:'2026-05-21T09:47:00Z', tags:['todo','infra'] },
    { uuid:'e5', text:"today's lesson — pretext is a library not a framework. you render with whatever.", updated:'2026-05-20T16:22:00Z', tags:['lesson'] },
    { uuid:'f6', text:'jamie birthday march 14', updated:'2026-05-19T11:00:00Z', tags:['reminder','people'] },
    { uuid:'g7', text:'the way to import 40 thousand art hoes to SF to teach engineers love (and thus save humankind) would be to open an elite fashion school. considering the materials science infrastructure this is actually the obvious path forward for fashion.', updated:'2026-05-18T03:14:00Z', tags:['idea','hot-take'] },
    { uuid:'h8', text:'every infra choice is a bet on who you will be in two years', updated:'2026-05-17T08:00:00Z', tags:['thought','infra'] },
  ];
  const fmt = iso => { const d=new Date(iso),p=n=>String(n).padStart(2,'0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${String(d.getFullYear()).slice(2)}`; };
  const TAG_COLORS = {todo:'#C8102E',shop:'#E8704A',idea:'#003B8E',board:'#0F766E',thought:'#6E3CBC',infra:'#44403c',lesson:'#C99700',reminder:'#2D6A4F',people:'#B8336A','hot-take':'#DC2626'};
  const tagColor = t => TAG_COLORS[t] || '#A8A29E';
  let activeTag = null;
  function escape(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
  function render(){
    const q = document.getElementById('search').value.toLowerCase().trim();
    let list = NOTES;
    if (activeTag) list = list.filter(n => n.tags.includes(activeTag));
    if (q) list = list.filter(n => n.text.toLowerCase().includes(q) || n.tags.some(t => t.includes(q)));
    const root = document.getElementById('notes'); root.innerHTML='';
    list.forEach(n=>{
      const el=document.createElement('article'); el.className='note';
      el.style.setProperty('--note-c', tagColor(n.tags[0]));
      const tagHtml = n.tags.map(t=>`<span class="tag" data-tag="${t}" style="--c:${tagColor(t)}">#${t}</span>`).join(' ');
      el.innerHTML = `<p class="text">${escape(n.text)} ${tagHtml}</p><div class="caption">${fmt(n.updated)}</div>`;
      root.appendChild(el);
    });
    document.getElementById('count').textContent = list.length;
    const f = document.getElementById('filter');
    if (activeTag) { f.style.display = ''; f.querySelector('button').textContent = `#${activeTag} ✕`; }
    else f.style.display = 'none';
  }
  render();
  document.getElementById('notes').addEventListener('click', e => {
    if (e.target.classList.contains('tag')) { activeTag = e.target.dataset.tag; render(); }
  });
  document.getElementById('clear-filter').addEventListener('click', () => { activeTag = null; render(); });
  let t; document.getElementById('search').addEventListener('input', () => { clearTimeout(t); t = setTimeout(render, 150); });
</script>
</body>
</html>
