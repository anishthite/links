   * ─────────────────────────────────────────────────────────────────── */

    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 56px;
    padding-top: 4px;
  }
  .masthead h1 {
    margin: 0;
    font-family: var(--sans);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -.02em;
    color: var(--stone-900);
    line-height: 1;
  }
  .masthead h1 .accent { color: var(--swiss-red); }
  .masthead .n {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 400;
    color: var(--stone-400);
    letter-spacing: -.005em;
    font-variant-numeric: tabular-nums;
  }
</style>
