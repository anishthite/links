<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>05 · Brutalist grid</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --accent: #ff3b00; --paper: #f4f4f0; --ink: #000; --rule: #000; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .theme-nav { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000;
    padding: 6px 10px; background: var(--ink); color: var(--paper); border: 2px solid var(--ink);
    display: flex; gap: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .theme-nav a { padding: 4px 10px; color: var(--paper); text-decoration: none; }
  .theme-nav a.active { background: var(--accent); color: var(--ink); }
  .theme-nav a:hover:not(.active) { background: var(--paper); color: var(--ink); }

  .board { padding: 72px 24px 64px; max-width: 1400px; margin: 0 auto; }
  .header { display: grid; grid-template-columns: 1fr auto; align-items: end; border-bottom: 2px solid var(--ink); padding-bottom: 12px; margin-bottom: 28px; gap: 24px; }
  .header h1 { margin: 0; font-family: 'Inter Tight', sans-serif; font-weight: 900; font-size: 64px; line-height: 0.9; letter-spacing: -0.04em; text-transform: uppercase; }
  .header h1 .accent { color: var(--accent); }
  .header .meta { text-align: right; font-size: 11px; text-transform: uppercase; letter-spacing: 0.10em; }
  .header .meta div { margin: 2px 0; }

  .notes { display: grid; grid-template-columns: 1fr; gap: 0; border-left: 2px solid var(--ink); border-top: 2px solid var(--ink); }
  @media (min-width: 720px)  { .notes { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1080px) { .notes { grid-template-columns: 1fr 1fr 1fr; } }
  @media (min-width: 1440px) { .notes { grid-template-columns: 1fr 1fr 1fr 1fr; } }

  .note { padding: 16px 18px 18px; border-right: 2px solid var(--ink); border-bottom: 2px solid var(--ink); background: var(--paper); position: relative; transition: background .08s; cursor: pointer; }
  .note:hover { background: var(--ink); color: var(--paper); }
  .note:hover .idx { color: var(--paper); background: var(--accent); }
  .note:hover .meta-line { color: var(--paper); }

  .idx { display: inline-block; padding: 2px 6px; background: var(--ink); color: var(--accent); font-weight: 700; font-size: 11px; letter-spacing: 0.06em; margin-bottom: 12px; }
  .text { font-family: 'Inter Tight', sans-serif; font-weight: 500; font-size: 17px; line-height: 1.35; letter-spacing: -0.005em; min-height: 60px; }
  .meta-line { margin-top: 14px; padding-top: 8px; border-top: 1px solid currentColor; display: flex; justify-content: space-between; font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; color: #555; font-family: 'JetBrains Mono', monospace; }
  .note:hover .meta-line { color: rgba(255,255,255,0.55); border-top-color: rgba(255,255,255,0.30); }
  .meta-line .b { font-weight: 700; }

  /* Loud accent variants — every Nth card gets the orange accent treatment */
  .note.accent { background: var(--accent); }
  .note.accent .idx { background: var(--ink); color: var(--accent); }
  .note.accent .meta-line { color: rgba(0,0,0,0.65); border-top-color: rgba(0,0,0,0.40); }
  .note.accent:hover { background: var(--ink); color: var(--accent); }
  .note.accent:hover .idx { background: var(--accent); color: var(--ink); }

  .note.dark { background: var(--ink); color: var(--paper); }
  .note.dark .idx { background: var(--accent); color: var(--ink); }
  .note.dark .meta-line { color: rgba(255,255,255,0.55); border-top-color: rgba(255,255,255,0.30); }
  .note.dark:hover { background: var(--accent); color: var(--ink); }
  .note.dark:hover .idx { background: var(--ink); color: var(--accent); }
</style>
</head>
<body>

<nav class="theme-nav">
  <a href="index.html">ALL</a>
  <a href="01-corkboard.html">01 CORK</a>
  <a href="02-swiss.html">02 SWISS</a>

  <a href="02d-grouped.html">02d</a>
  <a href="02e-pills.html">02e</a>
  <a href="02e-bg.html">02e-BG ★</a>
  <a href="side/02f-nerv.html">side: 02f</a>
  <a href="side/03-nerv.html">side: 03</a>
  <a href="side/03b-nerv-light.html">side: 03b</a>
  <a class="active" href="04-brutalist.html">04 BRUTAL</a>
</nav>

<main class="board">
  <header class="header">
    <h1>NOTE<span class="accent">.</span>BOARD</h1>
    <div class="meta">
      <div>RECORDS / 8</div>
      <div>SORT / RECENT</div>
      <div>OPERATOR / ANISH</div>
    </div>
  </header>

  <div class="notes" id="notes"></div>
</main>

<script>
  const NOTES = [
    { uuid: 'a1', text: 'buy bok choy', updated: '2026-05-22T18:04:00Z' },
    { uuid: 'b2', text: 'idea: sticky note board with masonry layout via pretext', updated: '2026-05-22T15:31:00Z' },
    { uuid: 'c3', text: 'the difference between vision and hallucination is whether other people can see it too', updated: '2026-05-21T22:11:00Z' },
    { uuid: 'd4', text: 'todo: ssh into the new box, set up tailscale, install zellij', updated: '2026-05-21T09:47:00Z' },
    { uuid: 'e5', text: "today's lesson — pretext is a library not a framework. you render with whatever.", updated: '2026-05-20T16:22:00Z' },
    { uuid: 'f6', text: 'jamie birthday march 14', updated: '2026-05-19T11:00:00Z' },
    { uuid: 'g7', text: 'the way to import 40 thousand art hoes to SF to teach engineers love (and thus save humankind) would be to open an elite fashion school. considering the materials science infrastructure this is actually the obvious path forward for fashion.', updated: '2026-05-18T03:14:00Z' },
    { uuid: 'h8', text: 'every infra choice is a bet on who you will be in two years', updated: '2026-05-17T08:00:00Z' },
  ];
  function isoCompact(s) {
    const d = new Date(s); const pad = n => String(n).padStart(2,'0');
    return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;
  }
  const root = document.getElementById('notes');
  NOTES.forEach((n, i) => {
    const idx = String(i + 1).padStart(3, '0');
    const variant = (i === 2) ? 'accent' : (i === 5) ? 'dark' : '';
    const el = document.createElement('article');
    el.className = 'note ' + variant;
    el.innerHTML = `
      <div class="idx">${idx}</div>
      <div class="text"></div>
      <div class="meta-line"><span>${isoCompact(n.updated)}</span><span class="b">${n.text.length}c</span></div>
    `;
    el.querySelector('.text').textContent = n.text;
    root.appendChild(el);
  });
</script>
</body>
</html>
